<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamil - Gestor de EPI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gamil-blue: #1e5bb0; 
            --gamil-dark: #333333;
            --gamil-light: #f4f7f6;
        }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        /* Sidebar customizada Gamil */
        .sidebar { background: white; min-height: 100vh; border-right: 1px solid #ddd; padding: 20px; position: fixed; width: inherit; }
        .logo-box { text-align: center; padding-bottom: 20px; border-bottom: 2px solid var(--gamil-blue); margin-bottom: 25px; }
        .logo-box img { max-width: 150px; }
        
        .nav-link { color: #666; font-weight: 500; padding: 12px; border-radius: 10px; cursor: pointer; transition: 0.2s; margin-bottom: 8px; }
        .nav-link:hover { background: #f0f4f8; color: var(--gamil-blue); }
        .nav-link.active { background: var(--gamil-blue); color: white !important; }

        /* Conteúdo */
        main { margin-left: 16.666%; padding: 30px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .btn-primary { background: var(--gamil-blue); border: none; padding: 10px 20px; border-radius: 8px; }
        .badge-estoque { font-size: 0.9rem; padding: 5px 10px; border-radius: 6px; }
        
        @media (max-width: 768px) {
            .sidebar { position: relative; min-height: auto; width: 100%; }
            main { margin-left: 0; }
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 sidebar">
            <div class="logo-box">
                <img src="logo.png" alt="Gamil Logo">
            </div>
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link active" onclick="showSection('sec-func', this)"><i class="fas fa-users me-2"></i>Equipe</a></li>
                <li class="nav-item"><a class="nav-link" onclick="showSection('sec-epi', this)"><i class="fas fa-boxes-stacked me-2"></i>EPIs</a></li>
                <li class="nav-item"><a class="nav-link" onclick="showSection('sec-hist', this)"><i class="fas fa-exchange-alt me-2"></i>Entregas</a></li>
            </ul>
        </nav>

        <main class="col-md-9 col-lg-10">
            
            <section id="sec-func" class="content-section">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold text-dark">Colaboradores</h2>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalFunc"><i class="fas fa-user-plus me-2"></i>Novo</button>
                </div>
                <div class="card p-3">
                    <table class="table table-hover align-middle">
                        <thead class="table-light"><tr><th>Nome</th><th>Matrícula</th><th>Cargo</th><th>Ações</th></tr></thead>
                        <tbody id="listaFunc"></tbody>
                    </table>
                </div>
            </section>

            <section id="sec-epi" class="content-section d-none">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold text-dark">Estoque de EPI</h2>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalEpi"><i class="fas fa-box me-2"></i>Cadastrar Item</button>
                </div>
                <div class="card p-3">
                    <table class="table table-hover align-middle">
                        <thead class="table-light"><tr><th>Material</th><th>CA</th><th>Quantidade</th><th>Ações</th></tr></thead>
                        <tbody id="listaEpi"></tbody>
                    </table>
                </div>
            </section>

            <section id="sec-hist" class="content-section d-none">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold text-dark">Histórico de Entregas</h2>
                    <button class="btn btn-primary" onclick="abrirModalEntrega()"><i class="fas fa-hand-holding me-2"></i>Registrar Saída</button>
                </div>
                <div class="card p-3">
                    <table class="table table-hover align-middle">
                        <thead class="table-light"><tr><th>Quem Recebeu</th><th>EPI</th><th>Data</th><th>Status</th></tr></thead>
                        <tbody id="listaHist"></tbody>
                    </table>
                </div>
            </section>

        </main>
    </div>
</div>

<div class="modal fade" id="modalFunc" tabindex="-1">
    <div class="modal-dialog">
        <form class="modal-content" id="formFunc">
            <div class="modal-header"><h5>Novo Colaborador</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <input type="text" id="fnome" class="form-control mb-3" placeholder="Nome Completo" required>
                <input type="text" id="fmat" class="form-control mb-3" placeholder="Nº Matrícula" required>
                <input type="text" id="fcargo" class="form-control" placeholder="Cargo">
            </div>
            <div class="modal-footer"><button type="submit" class="btn btn-primary w-100">Salvar</button></div>
        </form>
    </div>
</div>

<div class="modal fade" id="modalEpi" tabindex="-1">
    <div class="modal-dialog">
        <form class="modal-content" id="formEpi">
            <div class="modal-header"><h5>Novo EPI no Estoque</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <input type="text" id="enome" class="form-control mb-3" placeholder="Nome do EPI (ex: Luvas de Nitrilo)" required>
                <input type="text" id="eca" class="form-control mb-3" placeholder="CA (Certificado de Aprovação)" required>
                <input type="number" id="eqtd" class="form-control" placeholder="Quantidade em Estoque" required>
            </div>
            <div class="modal-footer"><button type="submit" class="btn btn-primary w-100">Adicionar</button></div>
        </form>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, query, orderBy } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Suas chaves fornecidas
    const firebaseConfig = {
        apiKey: "AIzaSyAUV-fh15eg_1T3brh0xFL1mKtEaj2cDQE",
        authDomain: "gamil-epi-manager.firebaseapp.com",
        projectId: "gamil-epi-manager",
        storageBucket: "gamil-epi-manager.firebasestorage.app",
        messagingSenderId: "480134215538",
        appId: "1:480134215538:web:1e623b38daf2eaea780feb",
        measurementId: "G-Q3CF2MF3Q5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- LÓGICA DE SINCRONIZAÇÃO EM TEMPO REAL ---

    // Sincronizar Funcionários
    onSnapshot(collection(db, "equipe"), (snap) => {
        const lista = document.getElementById('listaFunc');
        lista.innerHTML = "";
        snap.forEach(d => {
            const f = d.data();
            lista.innerHTML += `<tr>
                <td><b>${f.nome}</b></td>
                <td>${f.matricula}</td>
                <td><span class="badge bg-light text-dark border">${f.cargo}</span></td>
                <td><button class="btn btn-sm text-danger" onclick="remover('equipe','${d.id}')"><i class="fas fa-trash"></i></button></td>
            </tr>`;
        });
    });

    // Sincronizar EPIs
    onSnapshot(collection(db, "epis"), (snap) => {
        const lista = document.getElementById('listaEpi');
        lista.innerHTML = "";
        snap.forEach(d => {
            const e = d.data();
            lista.innerHTML += `<tr>
                <td><b>${e.nome}</b></td>
                <td><small class="text-muted">CA ${e.ca}</small></td>
                <td><span class="badge badge-estoque ${e.qtd < 5 ? 'bg-danger':'bg-success'}">${e.qtd} un</span></td>
                <td><button class="btn btn-sm text-danger" onclick="remover('epis','${d.id}')"><i class="fas fa-trash"></i></button></td>
            </tr>`;
        });
    });

    // --- FUNÇÕES DE SALVAMENTO ---

    document.getElementById('formFunc').onsubmit = async (e) => {
        e.preventDefault();
        await addDoc(collection(db, "equipe"), {
            nome: document.getElementById('fnome').value,
            matricula: document.getElementById('fmat').value,
            cargo: document.getElementById('fcargo').value
        });
        bootstrap.Modal.getInstance(document.getElementById('modalFunc')).hide();
        e.target.reset();
    };

    document.getElementById('formEpi').onsubmit = async (e) => {
        e.preventDefault();
        await addDoc(collection(db, "epis"), {
            nome: document.getElementById('enome').value,
            ca: document.getElementById('eca').value,
            qtd: parseInt(document.getElementById('eqtd').value)
        });
        bootstrap.Modal.getInstance(document.getElementById('modalEpi')).hide();
        e.target.reset();
    };

    window.remover = async (coll, id) => {
        if(confirm("Deseja apagar este registro permanentemente da Gamil?")) {
            await deleteDoc(doc(db, coll, id));
        }
    };

    // Navegação
    window.showSection = (id, el) => {
        document.querySelectorAll('.content-section').forEach(s => s.classList.add('d-none'));
        document.getElementById(id).classList.remove('d-none');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        el.classList.add('active');
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
